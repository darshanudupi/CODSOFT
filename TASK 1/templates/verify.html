<!DOCTYPE html>
<html>
<head>
    <title>Verify</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #ff9966, #ff5e62);
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .card {
            padding: 30px;
            border-radius: 20px;
            background: white;
            width: 300px;
            text-align: center;
        }
    </style>
</head>
<body>

<div class="card">
    <h4>🔐 Enter OTP</h4>

    <form method="POST">
        <input type="text" name="otp" class="form-control my-3" placeholder="Enter OTP" required>
        <button class="btn btn-danger w-100">Verify</button>
    </form>

    <small class="text-muted">Check terminal for OTP</small>
</div>

</body>
</html>
