<!DOCTYPE html>
<html>
<head>
    <title>App Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            height: 100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Inter', sans-serif;
        }

        .card {
            width: 500px;  /* 🔥 Increased size */
            padding: 60px;
            border-radius: 20px;
            background: white;
            text-align: center;
            box-shadow: 0 15px 40px rgba(0,0,0,0.15);
        }

        .title {
            font-size: 32px;  /* 🔥 Bigger title */
            font-weight: 600;
            margin-bottom: 15px;
        }

        .subtitle {
            font-size: 16px;
            color: gray;
            margin-bottom: 30px;
        }

        .btn-main {
            width: 180px;
            padding: 12px;
            font-size: 16px;
            margin: 10px;
            border-radius: 25px;
        }
    </style>
</head>

<body>

<div class="card">
    <div class="title">📱 App Signup</div>
    <div class="subtitle">Create or access your account</div>

    <!-- FIXED BUTTON ALIGNMENT -->
    <div class="d-flex justify-content-center gap-3 mt-3">
        <a href="/signin" class="btn btn-primary btn-main">Sign In</a>
        <a href="/signup" class="btn btn-success btn-main">Sign Up</a>
    </div>
</div>

</body>
</html>
