<!DOCTYPE html>
<html>
<head>
    <title>Success</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <style>
        body {
            height: 100vh;
            background: linear-gradient(135deg, #00ff87, #60efff);
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .card {
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            background: white;
            animation: pop 0.5s ease;
        }

        @keyframes pop {
            from {transform: scale(0.8);}
            to {transform: scale(1);}
        }
    </style>
</head>

<body>

<div class="card">
    <h1>🎉 Success!</h1>
    <h3>Welcome, {{ name }}</h3>
</div>

</body>
</html>
